# PCIe Gen5 LTSSM Contract Reference
site_name: "PCIe Gen5 LTSSM Contract"
site_description: "Governed reference for LTSSM and link-training contract slices"
site_author: "PCIe G5 Contract Team"
site_url: https://sweatdance.github.io/pcie_g5_contract/
repo_url: https://github.com/sweatdance/pcie_g5_contract
repo_name: sweatdance/pcie_g5_contract

theme:
  name: material
  palette:
    scheme: default
    primary: grey
    accent: blue
  font:
    text: Source Sans 3
    code: Source Code Pro
  icon:
    repo: fontawesome/brands/github
    logo: material/server
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.path
    - navigation.tracking
    - content.tabs.link
    - content.code.copy
    - search.suggest
  language: en

copyright: "PCIe LTSSM contract reference"

plugins:
  - search

nav:
  - Home: index.md
  - Required Link-Training:
      - Overview: en/index.md
      - LTSSM State Transitions: en/specs/required/spec-ltssm-state-transitions.md
      - LTSSM Checklist: en/specs/required/spec-ltssm-checklist.md
      - Link Equalization Rules: en/specs/required/spec-link-equalization-rules.md
      - Speed and Width Negotiation: en/specs/required/spec-speed-width-negotiation.md
      - Recovery and Fallback: en/specs/required/spec-recovery-and-fallback.md
  - Advisory PCIe Topics:
      - Power Management: en/specs/advisory/spec-power-management.md
      - AER Rules: en/specs/advisory/spec-aer-rules.md
      - DLL Rules: en/specs/advisory/spec-dll-rules.md
      - TLP Rules: en/specs/advisory/spec-tlp-rules.md
      - Hot-Plug Rules: en/specs/advisory/spec-hotplug-rules.md
      - Config Space: en/specs/advisory/spec-config-space.md
  - Evidence & Governance:
      - Specification Library: en/specs/index.md
      - Verification Status: en/verification-status.md
      - Evidence Grid: en/evidence-grid.md
      - Consumer Integration: en/consumer-integration.md
      - Contract Mapping: en/contract-mapping.md
      - Version Source Map: en/version-source-map.md
      - LLM Policy: en/llm-wiki.md
      - Glossary: en/glossary-and-mapping.md
      - Glossary for LLM: en/specs/spec-glossary-for-llm.md
      - Spec-to-Contract Mapping: en/specs/spec-contract-mapping.md
      - Spec Surface Matrix: en/specs/spec-surface-matrix.md
      - JSON Report Schema: en/specs/spec-json-report-schema.md
      - Advisory Failure Playbook: en/specs/spec-advisory-failure-playbook.md
      - Release Notes: en/release-notes.md
      - Spec Release Notes: en/specs/spec-release-notes.md
      - Consumer Integration Contract: en/specs/spec-consumer-integration-contract.md
      - Spec Coverage Audit: en/specs/spec-coverage-audit.md
  - Source Documents:
      - LLM Wiki Source: LLM_WIKI.md
      - Verification Status Source: LLM_VERIFICATION_STATUS.md
      - Consumer Integration Source: CONSUMER_INTEGRATION_CONTRACT.md
      - Glossary Source: PCIE5_GLOSSARY_FOR_LLM.md
      - JSON Report Schema Source: PCIE5_JSON_REPORT_SCHEMA.md
      - Spec-to-Contract Mapping Source: PCIE5_SPEC_TO_CONTRACT_MAPPING.md
      - AER Rules Source: PCIE5_AER_RULES.md
      - Config Space Source: PCIE5_CONFIG_SPACE.md
      - DLL Rules Source: PCIE5_DLL_RULES.md
      - Hot-Plug Rules Source: PCIE5_HOTPLUG_RULES.md
      - Link Equalization Rules Source: PCIE5_LINK_EQUALIZATION_RULES.md
      - LTSSM Checklist Source: PCIE5_LTSSM_CHECKLIST.md
      - LTSSM State Transitions Source: PCIE5_LTSSM_STATE_TRANSITIONS.md
      - Power Management Source: PCIE5_POWER_MANAGEMENT.md
      - Recovery and Fallback Source: PCIE5_RECOVERY_AND_FALLBACK.md
      - Speed and Width Negotiation Source: PCIE5_SPEED_WIDTH_NEGOTIATION.md
      - TLP Rules Source: PCIE5_TLP_RULES.md
      - Release Notes Source: RELEASE_NOTES_v0.3.0.md
extra_css:
  - assets/styles.css
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

name: Governance Validation

on:
  push:
    branches: [main]
    paths:
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "contract.yaml"
      - "scripts/**"
      - "fixtures/**"
      - "validators/**"
      - ".github/workflows/governance-validation.yml"
  pull_request:
    branches: [main]
    paths:
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "contract.yaml"
      - "scripts/**"
      - "fixtures/**"
      - "validators/**"
      - ".github/workflows/governance-validation.yml"
  workflow_dispatch:

jobs:
  ltssm-required-smoke:
    runs-on: ubuntu-latest
    env:
      FRAMEWORK_REPOSITORY: Gavin0099/ai-governance-framework
      FRAMEWORK_REF: main
    steps:
      - name: Checkout contract repo
        uses: actions/checkout@v4

      - name: Checkout framework repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRAMEWORK_REPOSITORY }}
          ref: ${{ env.FRAMEWORK_REF }}
          path: ai-governance-framework
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install framework dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r ai-governance-framework/requirements.txt

      - name: Create validation artifact directory
        run: mkdir -p artifacts/validation

      - name: Run required fixture smoke
        run: python scripts/run_fixture_smoke.py --framework-root ai-governance-framework --contract-root . --suite required --format json > artifacts/validation/governance-validation-required.json

      - name: Run required regression smoke
        run: python scripts/run_regression_smoke.py --framework-root ai-governance-framework --contract-root . --suite required --format json > artifacts/validation/governance-validation-regression-required.json

      - name: Upload required receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-validation-required
          path: artifacts/validation/governance-validation-required.json

      - name: Upload required regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-validation-regression-required
          path: artifacts/validation/governance-validation-regression-required.json

  protocol-expansion-advisory-smoke:
    runs-on: ubuntu-latest
    needs: ltssm-required-smoke
    continue-on-error: true
    env:
      FRAMEWORK_REPOSITORY: Gavin0099/ai-governance-framework
      FRAMEWORK_REF: main
    steps:
      - name: Checkout contract repo
        uses: actions/checkout@v4

      - name: Checkout framework repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRAMEWORK_REPOSITORY }}
          ref: ${{ env.FRAMEWORK_REF }}
          path: ai-governance-framework
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install framework dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r ai-governance-framework/requirements.txt

      - name: Create validation artifact directory
        run: mkdir -p artifacts/validation

      - name: Run advisory fixture smoke
        run: python scripts/run_fixture_smoke.py --framework-root ai-governance-framework --contract-root . --suite advisory --format json > artifacts/validation/governance-validation-advisory.json

      - name: Run advisory regression smoke
        run: python scripts/run_regression_smoke.py --framework-root ai-governance-framework --contract-root . --suite advisory --format json > artifacts/validation/governance-validation-regression-advisory.json

      - name: Upload advisory receipts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-validation-advisory
          path: artifacts/validation/governance-validation-advisory.json

      - name: Upload advisory regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-validation-regression-advisory
          path: artifacts/validation/governance-validation-regression-advisory.json

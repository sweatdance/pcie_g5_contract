name: Governance Drift

on:
  push:
    branches: [main]
    paths:
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "contract.yaml"
      - "governance/**"
  pull_request:
    branches: [main]
    paths:
      - ".governance/**"
      - "AGENTS.base.md"
      - "AGENTS.md"
      - "PLAN.md"
      - "contract.yaml"
      - "governance/**"
  workflow_dispatch:

jobs:
  governance-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Checkout framework repo
        uses: actions/checkout@v4
        with:
          repository: Gavin0099/ai-governance-framework
          ref: main
          path: ai-governance-framework
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install framework dependencies
        run: python -m pip install -r ai-governance-framework/requirements.txt

      - name: Run governance drift check
        run: |
          python ai-governance-framework/governance_tools/governance_drift_checker.py \
            --repo . \
            --framework-root ai-governance-framework \
            --format human
